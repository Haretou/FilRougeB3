name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint · Build · Tests · Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Automated tests (crypto zero-knowledge)
        run: npm test

      - name: Build (typecheck + bundle)
        run: npm run build
        env:
          # Valeurs factices : le build ne se connecte a rien, mais certaines
          # variables sont lues au chargement des modules.
          DATABASE_URL: mysql://ci:ci@localhost:3306/ci
          MINIO_ENDPOINT: localhost
          MINIO_PORT: "9000"
          MINIO_ACCESS_KEY: ci
          MINIO_SECRET_KEY: ci
          MINIO_BUCKET: ci

      - name: Dependency audit (informational)
        run: npm audit --audit-level=high
        continue-on-error: true
